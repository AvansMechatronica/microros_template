; PlatformIO projectconfiguratie
;
; Dit bestand bepaalt per omgeving (env) o.a.:
; - welk board en framework gebruikt worden
; - welke libraries automatisch geïnstalleerd worden
; - welke compileer-defines (build_flags) actief zijn
; - hoe seriële monitor en micro-ROS transport ingesteld zijn
;
; Meer documentatie:
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Standaardomgeving wanneer je `platformio run` uitvoert zonder --environment.
default_envs = esp32-C3

[env:eps32-upesy_wroom]
; Doelplatform (ESP32 toolchain + SDK's).
platform = espressif32
; Board-definitie voor de UPESY WROOM variant.
board = upesy_wroom
; Gebruik Arduino-framework in plaats van ESP-IDF.
framework = arduino
; Baudrate voor seriële monitor-output.
monitor_speed = 115200

; Externe libraries/dependencies voor dit project:
; - micro_ros_platformio: micro-ROS integratie voor PlatformIO
lib_deps = 
    https://github.com/AvansMechatronica/micro_ros_platformio


; Compileer-defines die in de code beschikbaar komen als macro's.
; Deze pinmapping hoort bij het UPESY WROOM board.
build_flags = 
  -DSTATUS_LED_PIN=2


; micro-ROS transportlaag via seriële verbinding.
board_microros_transport = serial

[env:esp32-C3]
; Tweede omgeving voor ESP32-C3 DevKitM-1.
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Build flags specifiek voor ESP32-C3:
; - USB CDC actief bij boot
; - USB mode actief
; - Debugniveau op maximaal detail (verbose)
; - Pinmapping voor status-led
build_flags = 
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=5    ; 0 None, 1 Error, 2 Warn, 3 Info, 4 Debug, 5 Verbose
  -DSTATUS_LED_PIN=8


; micro-ROS transportlaag via seriële verbinding.
board_microros_transport = serial

; Baudrate voor seriële monitor-output.
monitor_speed = 115200

; Zelfde kernlibraries als de andere omgeving.
lib_deps =
    https://github.com/AvansMechatronica/micro_ros_platformio

    
